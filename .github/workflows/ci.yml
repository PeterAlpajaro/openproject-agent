name: CI

# Phase 2 (cloud-deploy-cicd): lint + unit-test every first-party service.
# Runs on pushes to main and on pull requests targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    # One job per (service x script) cell -> six independent jobs.
    name: ${{ matrix.service }} / ${{ matrix.script }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # Let every cell run to completion even if one fails, so a single
      # failure doesn't mask results from the other services/scripts.
      fail-fast: false
      matrix:
        service: [mcp-server, orchestrator, frontend, ci]
        script: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20.18
        uses: actions/setup-node@v4
        with:
          node-version: "20.18"
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies (${{ matrix.service }})
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run ${{ matrix.script }} (${{ matrix.service }})
        working-directory: ${{ matrix.service }}
        run: npm run ${{ matrix.script }}

  build-verify:
    # Phase 3 (cloud-deploy-cicd): confirm every first-party image builds for
    # the Oracle A1 target (linux/arm64). Verification only — nothing is
    # pushed. GitHub runners are x86, so QEMU provides arm64 emulation.
    name: arm64 build verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build mcp-server (linux/arm64)
        uses: docker/build-push-action@v6
        timeout-minutes: 30
        with:
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          platforms: linux/arm64
          push: false

      - name: Build orchestrator (linux/arm64)
        uses: docker/build-push-action@v6
        timeout-minutes: 30
        with:
          context: ./orchestrator
          file: ./orchestrator/Dockerfile
          platforms: linux/arm64
          push: false

      - name: Build nginx (linux/arm64)
        uses: docker/build-push-action@v6
        timeout-minutes: 30
        with:
          # nginx is a root-context multi-stage build: it compiles the
          # frontend then bakes the static assets into the nginx image.
          context: .
          file: ./nginx/Dockerfile
          platforms: linux/arm64
          push: false

      - name: Verify nginx widget assets are built and non-empty
        timeout-minutes: 30
        run: |
          # Export the frontend build stage and assert the compiled widget
          # assets exist with non-zero size, so a broken frontend build fails
          # CI instead of shipping an empty widget.
          docker buildx build \
            --platform linux/arm64 \
            --target frontend-build \
            --file nginx/Dockerfile \
            --output type=local,dest=./_widget \
            .
          echo "Exported frontend build stage; checking assets..."
          test -s ./_widget/app/dist/widget.js
          test -s ./_widget/app/dist/widget.css
          echo "OK: widget.js and widget.css are present and non-empty"
