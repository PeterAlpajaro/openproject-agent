name: Deploy

# Phase 4 (cloud-deploy-cicd): publish arm64 images to GHCR.
# Runs only after the CI workflow completes successfully for a push to main.
# (workflow_run-triggered workflows only fire from the default branch.)
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  publish:
    name: Publish ${{ matrix.name }} to GHCR
    runs-on: ubuntu-latest
    # Gate: only a successful CI run that was itself triggered by a push to main.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp-server
            context: ./mcp-server
            file: ./mcp-server/Dockerfile
          - name: orchestrator
            context: ./orchestrator
            file: ./orchestrator/Dockerfile
          - name: nginx
            context: .
            file: ./nginx/Dockerfile
    steps:
      - name: Checkout the exact commit CI validated
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node 20.18
        uses: actions/setup-node@v4
        with:
          node-version: "20.18"

      - name: Compute image reference and tags
        id: meta
        run: |
          # GHCR namespaces must be lowercase.
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner}/openproject-agent-${{ matrix.name }}" >> "$GITHUB_OUTPUT"
          # Short SHA is derived by the unit/property-tested helper.
          sha7=$(node ci/lib/tags.js "${{ github.event.workflow_run.head_sha }}")
          echo "sha7=${sha7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Login failure fails the job, so nothing is pushed and CD never runs.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} (linux/arm64)
        # 10-minute ceiling per image push (the spec's 600s budget).
        timeout-minutes: 10
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          SHA7: ${{ steps.meta.outputs.sha7 }}
          CONTEXT: ${{ matrix.context }}
          DOCKERFILE: ${{ matrix.file }}
        run: |
          set -euo pipefail
          attempt=0
          max_attempts=4   # initial try + up to 3 retries for transient errors
          until docker buildx build \
              --platform linux/arm64 \
              --file "$DOCKERFILE" \
              --tag "${IMAGE}:${SHA7}" \
              --tag "${IMAGE}:latest" \
              --push \
              "$CONTEXT"; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Failed to build/push ${IMAGE} after ${attempt} attempts"
              exit 1
            fi
            echo "Push attempt ${attempt} failed; retrying in 10s..."
            sleep 10
          done
          echo "Pushed ${IMAGE}:${SHA7} and ${IMAGE}:latest"

  deploy:
    name: Deploy to Oracle A1
    # Runs only after all three images are published.
    needs: publish
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read
      packages: read
    env:
      # Directory on the VM (relative to the SSH user's home) that holds the
      # committed compose files and the existing .env. Phase 6 will automate
      # .env delivery; Phase 5 relies on one already being present here.
      DEPLOY_DIR: openproject-agent
    steps:
      - name: Checkout the exact commit CI validated
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node 20.18
        uses: actions/setup-node@v4
        with:
          node-version: "20.18"

      - name: Compute image tag (short SHA)
        id: meta
        run: echo "sha7=$(node ci/lib/tags.js "${{ github.event.workflow_run.head_sha }}")" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy compose files to the VM
        run: |
          SSH="ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          $SSH "mkdir -p ~/${DEPLOY_DIR}"
          scp -i ~/.ssh/deploy_key docker-compose.yml docker-compose.prod.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/${DEPLOY_DIR}/"

      - name: Log in to GHCR on the VM
        # Token piped via stdin (never on the command line). The short-lived
        # GITHUB_TOKEN is valid only for this run; we log out at the end.
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | \
            ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"

      - name: Pull images and bring up the stack (rollback-safe)
        env:
          SHA7: ${{ steps.meta.outputs.sha7 }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "IMAGE_TAG='${SHA7}' DEPLOY_DIR='${DEPLOY_DIR}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd ~/"${DEPLOY_DIR}"
          if [ ! -f .env ]; then
            echo "::error::.env not found in ~/${DEPLOY_DIR} on the server. Phase 5 relies on an existing .env (Phase 6 automates this)."
            exit 1
          fi
          COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
          # Pull first; on failure the previously running stack is left untouched.
          if ! $COMPOSE pull; then
            echo "::error::docker compose pull failed; leaving the existing stack untouched."
            exit 1
          fi
          # Only recreate after a successful pull. --no-build uses the pulled
          # images rather than building on the VM.
          $COMPOSE up -d --no-build
          REMOTE

      - name: Health check (nginx on :8080)
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "bash -s" <<'REMOTE'
          set -euo pipefail
          deadline=$((SECONDS + 120))
          until curl -fsS -o /dev/null http://localhost:8080; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::nginx did not return a healthy response on :8080 within 120s"
              exit 1
            fi
            echo "waiting for nginx on :8080..."
            sleep 10
          done
          echo "OK: nginx responded on :8080"
          REMOTE

      - name: Log out of GHCR on the VM
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "docker logout ghcr.io || true"
