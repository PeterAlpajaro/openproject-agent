server {
    listen 80;
    server_name _;

    # --- API Routing: proxy /llm-api/* to orchestrator ---
    location /llm-api/ {
        proxy_pass http://orchestrator:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Widget Static Files ---
    location /widget/ {
        alias /usr/share/nginx/html/widget/;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # --- OpenProject Proxy with Widget Injection ---
    location / {
        proxy_pass http://web:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable gzip from upstream so sub_filter can work
        proxy_set_header Accept-Encoding "";

        # Inject the chat widget before </body>
        sub_filter '</body>' '<link rel="stylesheet" href="/widget/widget.css"><script type="module" src="/widget/widget.js"></script></body>';
        sub_filter_once on;
    }
}
